<!-- @dsCard group="Colors" viewport="700x180" name="Brand · Gold" subtitle="Primary metallic accent — CTAs, wordmark, rules" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); }
  .wrap { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; height: 130px; border-radius: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; }
  .sw:first-child { border-radius: var(--radius-md) 0 0 var(--radius-md); }
  .sw:last-child { border-radius: 0 var(--radius-md) var(--radius-md) 0; }
  .name { font-size: 12px; font-weight: 700; color: rgba(255,255,255,.95); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,.8); margin-top: 2px; }
  .dark .name, .dark .hex { color: rgba(255,255,255,.95); }
  .light .name { color: var(--ink-800); }
  .light .hex { color: var(--gray-600); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw light" style="background: var(--gold-100)"><span class="name">gold-100</span><span class="hex">#F5EAC9</span></div>
    <div class="sw light" style="background: var(--gold-300)"><span class="name">gold-300</span><span class="hex">#E0C277</span></div>
    <div class="sw dark" style="background: var(--gold-500)"><span class="name">gold-500 ★</span><span class="hex">#C8A24C</span></div>
    <div class="sw dark" style="background: var(--gold-600)"><span class="name">gold-600</span><span class="hex">#AE8838</span></div>
    <div class="sw dark" style="background: var(--gold-700)"><span class="name">gold-700</span><span class="hex">#8F6E2B</span></div>
    <div class="sw dark" style="background: var(--gradient-gold-sheen)"><span class="name">sheen</span><span class="hex">gradient</span></div>
  </div>
</body>
</html>
