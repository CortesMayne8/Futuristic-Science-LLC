<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base unit — 4 → 96" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); padding: 24px 28px; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { text-align: center; }
  .bar { background: var(--gold-300); border-radius: var(--radius-xs); width: 100%; }
  .box { display: flex; align-items: flex-end; height: 96px; }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--ink-800); margin-top: 8px; font-weight: 500; }
  .px { font-size: 10px; color: var(--gray-500); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box"><div class="bar" style="height:4px"></div></div><div class="n">1</div><div class="px">4px</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:8px"></div></div><div class="n">2</div><div class="px">8px</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:16px"></div></div><div class="n">4</div><div class="px">16px</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:24px"></div></div><div class="n">6</div><div class="px">24px</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:32px"></div></div><div class="n">8</div><div class="px">32px</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:48px"></div></div><div class="n">12</div><div class="px">48px</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:64px"></div></div><div class="n">16</div><div class="px">64px</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:80px"></div></div><div class="n">20</div><div class="px">80px</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:96px"></div></div><div class="n">24</div><div class="px">96px</div></div>
  </div>
</body>
</html>
