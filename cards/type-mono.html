<!-- @dsCard group="Type" viewport="700x170" name="Mono · IBM Plex Mono" subtitle="Batch numbers, COA IDs, lab data, table prices" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); padding: 24px 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 36px; max-width: 600px; }
  .k { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--gray-500); margin-bottom: 4px; }
  .v { font-family: var(--font-mono); font-size: 16px; color: var(--ink-800); letter-spacing: .02em; }
  .v .verified { color: var(--teal-500); font-weight: 600; }
  .price { font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: var(--ink-900); }
</style>
</head>
<body>
  <div class="grid">
    <div><div class="k">Batch No.</div><div class="v">FUTURE-CN-MARK-GHKC-0701-001</div></div>
    <div><div class="k">COA Status</div><div class="v"><span class="verified">VERIFIED</span></div></div>
    <div><div class="k">Purity (HPLC)</div><div class="v">99.4%</div></div>
    <div><div class="k">Unit Price</div><div class="price">$64.00</div></div>
  </div>
</body>
</html>
