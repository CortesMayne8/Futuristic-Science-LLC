<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); padding: 22px; }
  .banner { display: flex; align-items: center; gap: 14px; background: var(--ink-800); border-radius: var(--radius-md); padding: 16px 20px; border-left: 4px solid var(--gold-500); }
  .ico { flex: none; width: 30px; height: 30px; color: var(--gold-400); }
  .txt .main { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: .01em; }
  .txt .sub { font-size: 12.5px; color: rgba(255,255,255,.62); margin-top: 3px; }
</style>
</head>
<body>
  <div class="banner">
    <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V5z"/><path d="m9 12 2 2 4-4"/></svg>
    <div class="txt">
      <div class="main">For Research Purposes Only. Not for human use.</div>
      <div class="sub">No medical, dosing, or human-use claims. Reconstitution = lab-handling info for qualified researchers.</div>
    </div>
  </div>
</body>
</html>
