<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="xs 4 · sm 6 · md 10 · lg 14 · xl 20 · pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); padding: 24px 28px; }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { text-align: center; }
  .sq { width: 78px; height: 78px; background: var(--gray-100); box-shadow: var(--ring-card); border-top: 3px solid var(--gold-500); }
  .n { font-size: 12px; font-weight: 700; color: var(--ink-800); margin-top: 8px; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--gray-500); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="sq" style="border-radius: var(--radius-xs)"></div><div class="n">xs</div><div class="px">4px</div></div>
    <div class="item"><div class="sq" style="border-radius: var(--radius-sm)"></div><div class="n">sm</div><div class="px">6px</div></div>
    <div class="item"><div class="sq" style="border-radius: var(--radius-md)"></div><div class="n">md</div><div class="px">10px</div></div>
    <div class="item"><div class="sq" style="border-radius: var(--radius-lg)"></div><div class="n">lg</div><div class="px">14px</div></div>
    <div class="item"><div class="sq" style="border-radius: var(--radius-xl)"></div><div class="n">xl</div><div class="px">20px</div></div>
    <div class="item"><div class="sq" style="border-radius: var(--radius-pill)"></div><div class="n">pill</div><div class="px">999px</div></div>
  </div>
</body>
</html>
