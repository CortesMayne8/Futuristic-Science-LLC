<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-display); background: var(--surface-page); padding: 26px 28px; color: var(--ink-900); }
  .row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 10px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--gray-500); width: 96px; flex: none; }
  .d  { font-size: 44px; font-weight: 800; letter-spacing: -.02em; line-height: 1; }
  .h1 { font-size: 32px; font-weight: 700; letter-spacing: -.02em; }
  .h2 { font-size: 24px; font-weight: 700; letter-spacing: -.01em; }
  .h3 { font-size: 19px; font-weight: 600; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">display/800</span><span class="d">Purity you can prove</span></div>
  <div class="row"><span class="lbl">h1/700</span><span class="h1">Research-grade peptides</span></div>
  <div class="row"><span class="lbl">h2/700</span><span class="h2">Third-party tested, every batch</span></div>
  <div class="row"><span class="lbl">h3/600</span><span class="h3">Certificate of Analysis</span></div>
</body>
</html>
