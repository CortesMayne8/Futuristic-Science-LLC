<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-subtle); padding: 26px 28px; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--gray-500); margin: 0 0 12px; }
  .group { margin-bottom: 24px; }
  .cards { display: grid; grid-template-columns: 240px 240px; gap: 18px; }
  .stack { display: flex; flex-direction: column; gap: 12px; max-width: 560px; }
  .row { display: flex; gap: 18px; align-items: center; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { ProductCard, TrustBadges, DisclaimerBanner, QuantityStepper } = window.FuturisticScienceDesignSystem_2ca7b0;
    function Demo() {
      const [qty, setQty] = React.useState(2);
      return (
        <div>
          <div className="group">
            <div className="lbl">Product Cards</div>
            <div className="cards">
              <ProductCard name="GHK-Cu" subtitle="Copper Peptide" size="100mg" price={64}
                image="../../assets/vial-ghk-cu.png" badge={{ tone:'gold', label:'Featured' }} />
              <ProductCard name="BPC-157" subtitle="Body Protection Compound" size="5mg" price={52}
                image="../../assets/vial-ghk-cu.png" inStock={false} />
            </div>
          </div>
          <div className="group">
            <div className="lbl">Trust Badges</div>
            <TrustBadges style={{ justifyContent: 'flex-start' }} />
          </div>
          <div className="group">
            <div className="lbl">Disclaimer Banner</div>
            <div className="stack">
              <DisclaimerBanner variant="strip" />
              <DisclaimerBanner variant="ink" detail="No medical or human-use claims. Reconstitution = lab handling for qualified researchers." />
              <DisclaimerBanner variant="inline" />
            </div>
          </div>
          <div className="group" style={{ marginBottom: 0 }}>
            <div className="lbl">Quantity Stepper</div>
            <div className="row">
              <QuantityStepper value={qty} onChange={setQty} />
              <QuantityStepper value={1} size="sm" onChange={()=>{}} />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
