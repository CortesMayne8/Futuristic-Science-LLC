<div class="fs-agegate" role="dialog" aria-modal="true" aria-labelledby="fs-ag-title">
  <style>
    .fs-agegate *{ box-sizing:border-box; }
    .fs-agegate{
      --gold:#C8A24C; --gold-700:#A07F35; --gold-50:#F7F1E2;
      --ink:#0B1B33; --teal:#12877F; --border:#E3E7ED; --fill:#F7F8FA;
      --body:'Manrope',system-ui,-apple-system,sans-serif;
      --display:'Newsreader',Georgia,serif;
      position:relative; width:100%; max-width:460px; margin:0 auto;
      background:#fff; border-radius:22px; padding:32px 26px 26px;
      box-shadow:0 30px 80px rgba(8,17,31,.45); overflow:hidden;
      font-family:var(--body); color:var(--ink); text-align:center;
    }
    .fs-agegate .fs-ag-bar{ position:absolute; top:0; left:0; right:0; height:5px;
      background:linear-gradient(90deg,#C8A24C 0%,#E4C876 45%,#12877F 100%); }
    .fs-agegate .fs-ag-logo{ display:block; height:44px; width:auto; margin:6px auto 20px; }
    .fs-agegate .fs-ag-eyebrow{
      display:inline-block; background:var(--gold-50); color:var(--gold-700);
      font-weight:700; font-size:12px; letter-spacing:.15em; text-transform:uppercase;
      padding:8px 15px; border-radius:999px; margin-bottom:14px; }
    .fs-agegate h2{ font-family:var(--display); font-weight:600; font-size:29px; line-height:1.12;
      letter-spacing:-.01em; margin:0 0 10px; }
    .fs-agegate .fs-ag-sub{ font-size:15px; line-height:1.55; color:#4A5566; margin:0 0 20px; }
    .fs-agegate .fs-ag-check{
      display:flex; align-items:flex-start; gap:12px; text-align:left;
      background:var(--fill); border:1.5px solid var(--border); border-radius:14px;
      padding:15px 16px; margin:0 0 18px; cursor:pointer; transition:border-color .15s, background .15s; }
    .fs-agegate .fs-ag-check:has(input:checked){ border-color:var(--gold); background:var(--gold-50); }
    .fs-agegate .fs-ag-check input{ width:22px; height:22px; margin:1px 0 0; flex:none; accent-color:var(--gold); }
    .fs-agegate .fs-ag-check span{ font-size:13.5px; line-height:1.5; font-weight:600; color:var(--ink); }
    .fs-agegate .fs-ag-enter{
      width:100%; height:56px; border:none; border-radius:14px; cursor:pointer;
      font-family:var(--body); font-weight:800; font-size:16px; color:var(--ink);
      background:linear-gradient(135deg,#E2C879,#C8A24C 46%,#A67C2E);
      box-shadow:0 12px 28px rgba(200,162,76,.40);
      transition:transform .16s cubic-bezier(.22,1,.36,1), box-shadow .16s, opacity .16s; }
    .fs-agegate .fs-ag-enter:hover:not(:disabled){ transform:translateY(-1px); box-shadow:0 16px 34px rgba(200,162,76,.5); }
    .fs-agegate .fs-ag-enter:disabled{ opacity:.45; cursor:not-allowed; box-shadow:none; }
    .fs-agegate .fs-ag-leave{ display:inline-block; margin-top:14px; background:none; border:none; cursor:pointer;
      font-family:var(--body); font-weight:600; font-size:13.5px; color:#8A93A0; text-decoration:underline; }
    .fs-agegate .fs-ag-fine{ margin:16px 0 0; font-size:11.5px; line-height:1.5; color:#98A0AC; }
  </style>
