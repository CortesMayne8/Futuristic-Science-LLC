<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Futuristic Science — Account</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,500;0,6..72,600;1,6..72,600&family=Manrope:wght@400;500;600;700;800&display=swap">
<style>
  :root{ --gold:#C8A24C; --gold-700:#A07F35; --gold-50:#F7F1E2; --ink:#0B1B33; --teal:#12877F;
    --border:#E3E7ED; --fill:#F1F2F5; --muted:#6B7482; --body:'Manrope',system-ui,sans-serif; --disp:'Newsreader',Georgia,serif; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:var(--body); color:#fff;
    background:radial-gradient(120% 60% at 50% 0%, #16294a 0%, #0B1B33 55%, #081326 100%); min-height:100vh; }
  .wrap{ max-width:460px; margin:0 auto; padding:34px 18px 40px; }
  .logo{ display:block; height:52px; width:auto; margin:0 auto 18px; }
  h1{ font-family:var(--body); font-weight:800; font-size:34px; line-height:1.1; text-align:center; margin:0 0 10px; }
  h1 em{ font-family:var(--disp); font-style:italic; font-weight:600; color:var(--gold); }
  .sub{ display:flex; align-items:center; justify-content:center; gap:8px; color:#AEB6C2; font-size:15px; margin:0 0 20px; }
  .sub svg{ width:16px; height:16px; color:var(--gold); }
  .social{ display:flex; align-items:center; justify-content:center; gap:12px; margin:0 0 22px; }
  .avs{ display:flex; }
  .avs span{ width:34px; height:34px; border-radius:999px; margin-left:-9px; border:2px solid #0B1B33;
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#fff; }
  .social .txt{ color:#AEB6C2; font-size:14px; }

  .card{ background:#fff; color:var(--ink); border-radius:20px; padding:22px 20px 24px; box-shadow:0 30px 70px rgba(0,0,0,.4); }
  .tabs{ display:flex; border-bottom:1px solid var(--border); margin-bottom:22px; }
  .tab{ flex:1; text-align:center; padding:12px 0 14px; background:none; border:none; cursor:pointer;
    font-family:var(--body); font-weight:700; font-size:18px; color:#9AA3B0; position:relative; }
  .tab.on{ color:var(--ink); }
  .tab.on::after{ content:""; position:absolute; left:12%; right:12%; bottom:-1px; height:3px; border-radius:3px; background:var(--gold); }

  .gbtn{ display:flex; align-items:center; justify-content:center; gap:12px; width:100%; height:60px; margin:4px 0 22px;
    background:var(--ink); color:#fff; border:none; border-radius:14px; cursor:pointer; font-family:var(--body); font-weight:700; font-size:16px; }
  .gbtn img{ width:24px; height:24px; background:#fff; border-radius:4px; padding:2px; }
  .divider{ display:flex; align-items:center; gap:12px; color:#98A0AC; font-size:12.5px; font-weight:600; margin:0 0 16px; }
  .divider::before,.divider::after{ content:""; flex:1; height:1px; background:var(--border); }

  label.fld{ display:block; margin-bottom:16px; }
  label.fld > span{ display:block; font-weight:700; font-size:14px; margin-bottom:8px; }
  .req{ color:#D9534F; }
  .fld input{ width:100%; height:54px; padding:0 16px; background:var(--fill); border:1.5px solid transparent; border-radius:12px;
    font-family:var(--body); font-size:15.5px; color:var(--ink); }
  .fld input::placeholder{ color:#9AA3B0; }
  .fld input:focus{ outline:none; background:#fff; border-color:var(--gold); box-shadow:0 0 0 3px rgba(200,162,76,.18); }

  .agree{ display:flex; align-items:flex-start; gap:12px; background:var(--gold-50); border:1px solid #EADFBF;
    border-radius:14px; padding:15px 16px; margin:2px 0 16px; }
  .agree input{ width:22px; height:22px; margin:1px 0 0; flex:none; accent-color:var(--gold); }
  .agree span{ font-size:14px; line-height:1.45; font-weight:600; color:var(--ink); }
  .legal{ font-size:12.5px; line-height:1.5; color:var(--muted); margin:0 0 18px; }
  .legal a{ color:var(--teal); font-weight:700; text-decoration:none; }
  .forgot{ display:block; text-align:right; margin:-4px 0 18px; font-size:13.5px; font-weight:600; color:var(--teal); text-decoration:none; }

  .cta{ width:100%; height:60px; border:none; border-radius:14px; cursor:pointer; color:var(--ink);
    font-family:var(--body); font-weight:800; font-size:17px;
    background:linear-gradient(135deg,#E2C879,#C8A24C 46%,#A67C2E); box-shadow:0 14px 30px rgba(200,162,76,.4); }
  .panel{ display:none; } .panel.on{ display:block; }
</style></head>

      <label class="fld"><span>Create Password <b class="req">*</b></span><input type="password" placeholder="Min 8 characters"></label>
      <label class="agree"><input type="checkbox">
        <span>I confirm I am 21 years of age or older and all products are for research use only.</span></label>
      <p class="legal">By creating an account you agree to our <a href="/terms/">Terms &amp; Conditions</a> and <a href="/privacy-policy/">Privacy Policy</a>. For laboratory research use only.</p>
      <button class="cta" type="button">Create Account</button>
    </div>

    <!-- SIGN IN -->
    <div class="panel" data-panel="signin">
      <label class="fld"><span>Email Address <b class="req">*</b></span><input type="email" placeholder="you@lab.com"></label>
      <label class="fld"><span>Password <b class="req">*</b></span><input type="password" placeholder="Your password"></label>
      <a class="forgot" href="/my-account/lost-password/">Forgot password?</a>
      <button class="cta" type="button">Sign In</button>
    </div>
  </div>
</div>
<script>
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click', function(){
      var name=t.getAttribute('data-tab');
      document.querySelectorAll('.tab').forEach(function(x){ x.classList.toggle('on', x===t); });
      document.querySelectorAll('.panel').forEach(function(p){ p.classList.toggle('on', p.getAttribute('data-panel')===name); });
    });
  });
</script>
</body></html>
