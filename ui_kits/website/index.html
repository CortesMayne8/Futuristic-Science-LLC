<script type="text/babel" data-presets="env,react">
  const { useState } = React;

  function App() {
    const [entered, setEntered] = useState(false);
    const [authed, setAuthed] = useState(false);
    const [page, setPage] = useState('home');
    const [productId, setProductId] = useState('ghk-cu');
    const [cart, setCart] = useState([]);
    const [cartOpen, setCartOpen] = useState(false);

    const scrollTop = () => { const el = document.getElementById('kit-scroll'); if (el) el.scrollTop = 0; };
    const nav = (p) => { setPage(p); setCartOpen(false); scrollTop(); };
    const openProduct = (id) => { setProductId(id); setPage('product'); scrollTop(); };

    const addToCart = (p, qty = 1) => {
      setCart((c) => {
        const found = c.find((x) => x.id === p.id);
        if (found) return c.map((x) => x.id === p.id ? { ...x, qty: x.qty + qty } : x);
        return [...c, { id: p.id, name: p.name, subtitle: p.subtitle, size: p.size, price: p.price, image: p.image, qty }];
      });
      setCartOpen(true);
    };
    const setQty = (id, n) => setCart((c) => c.map((x) => x.id === id ? { ...x, qty: n } : x));
    const removeItem = (id) => setCart((c) => c.filter((x) => x.id !== id));
    const cartCount = cart.reduce((s, x) => s + x.qty, 0);

    let screen;
    if (page === 'home') screen = <HomeScreen onNav={nav} onAdd={addToCart} onOpenProduct={openProduct} />;
    else if (page === 'shop') screen = <ShopScreen onOpenProduct={openProduct} />;
    else if (page === 'product') screen = <ProductScreen productId={productId} onAdd={addToCart} onNav={nav} />;
    else if (page === 'coa') screen = <COAScreen />;
    else if (page === 'track') screen = <TrackOrderScreen />;
    else if (page === 'checkout') screen = <CheckoutScreen cart={cart} onNav={nav} />;
    else screen = <SimplePage page={page} onNav={nav} />;

    return (
      <React.Fragment>
        <div id="kit-scroll">
          <Header current={['product'].includes(page) ? 'shop' : page} onNav={nav} cartCount={cartCount} onCart={() => setCartOpen(true)} />
          {screen}
          <Footer onNav={nav} />
        </div>
        <CartDrawer open={cartOpen} items={cart} onClose={() => setCartOpen(false)}
          onQty={setQty} onRemove={removeItem} onCheckout={() => { setCartOpen(false); nav('checkout'); }} />
        {!entered && <AgeGate onEnter={() => setEntered(true)} />}
        {entered && !authed && <AuthGate onAuth={() => setAuthed(true)} />}
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
